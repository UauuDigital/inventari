<!DOCTYPE html>
<html lang="ca" color-scheme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#221F1E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inventari">
  <meta name="description" content="Gestió d'inventari — Uauu">
  <title>Inventari — Uauu</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="app-header-bar">
      <div class="app-header-left">
        <svg class="app-logo" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect x="3" y="9" width="22" height="16" rx="2.5" stroke="white" stroke-width="1.5"/>
          <path d="M3 14h22" stroke="white" stroke-width="1.5"/>
          <path d="M10 14V9a4 4 0 018 0v5" stroke="white" stroke-width="1.5" fill="none"/>
          <path d="M11 19h6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <h1 class="app-title">Inventari</h1>
      </div>
      <div class="app-header-actions">
        <button class="icon-btn" id="btn-search" aria-label="Cerca">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="search-bar" id="search-bar">
      <input class="search-input" id="search-input" type="search" placeholder="Cerca articles…" autocomplete="off" aria-label="Cerca articles">
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="app-main" id="app-main">

    <!-- VIEW: ARTICLES -->
    <div id="view-list" class="view-panel">
      <div class="stats-strip" id="stats-strip"></div>
      <div class="filter-pills" id="filter-pills"></div>
      <div class="items-grid" id="items-grid"></div>
      <div class="empty-state" id="empty-state" hidden>
        <svg class="empty-icon" width="56" height="56" viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="1.5" aria-hidden="true">
          <rect x="8" y="20" width="48" height="38" rx="4"/>
          <path d="M8 30h48"/>
          <path d="M24 30V20a8 8 0 0116 0v10"/>
          <path d="M26 42h12"/>
        </svg>
        <p class="empty-title">Inventari buit</p>
        <p class="empty-text">Afegeix el primer article per<br>començar a gestionar l'estoc.</p>
      </div>
    </div>

    <!-- VIEW: CATEGORIES -->
    <div id="view-cats" class="view-panel" hidden>
      <div class="cat-manage-wrap" id="cat-manage-wrap"></div>
    </div>

    <!-- VIEW: RESUM -->
    <div id="view-stats" class="view-panel" hidden>
      <div class="stats-view" id="stats-content"></div>
    </div>

  </main>

  <!-- ── FAB ── -->
  <button class="fab" id="btn-add" aria-label="Nou article">
    <span class="fab-icon" aria-hidden="true">+</span>
    <span>Nou article</span>
  </button>

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav" aria-label="Navegació principal">
    <button class="nav-tab active" data-view="list" aria-label="Articles">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      Articles
    </button>
    <button class="nav-tab" data-view="cats" aria-label="Categories">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="5" cy="6" r="1.5" fill="currentColor" stroke="none"/>
        <path d="M10 6h10M10 12h10M10 18h6"/>
        <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="5" cy="18" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      Categories
    </button>
    <button class="nav-tab" data-view="stats" aria-label="Resum">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 20V10M12 20V4M6 20v-6"/>
      </svg>
      Resum
    </button>
  </nav>

  <!-- ── MODAL: ARTICLE ── -->
  <div class="modal-overlay" id="modal-item" role="dialog" aria-modal="true" aria-labelledby="modal-item-title">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-item-title">Nou article</h2>
        <button class="modal-close" id="btn-modal-close" aria-label="Tancar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form class="modal-form" id="item-form" autocomplete="off" novalidate>
        <div class="form-field">
          <label class="form-label" for="f-name">Nom *</label>
          <input class="form-input" id="f-name" type="text" placeholder="Nom de l'article" required>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label" for="f-quantity">Quantitat</label>
            <input class="form-input" id="f-quantity" type="number" min="0" step="any" placeholder="0">
          </div>
          <div class="form-field">
            <label class="form-label" for="f-unit">Unitat</label>
            <input class="form-input" id="f-unit" type="text" placeholder="u, kg, l…">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label" for="f-min-stock">Estoc mínim</label>
            <input class="form-input" id="f-min-stock" type="number" min="0" step="any" placeholder="—">
          </div>
          <div class="form-field">
            <label class="form-label" for="f-price">Preu/u (€)</label>
            <input class="form-input" id="f-price" type="number" min="0" step="0.01" placeholder="—">
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-category">Categoria</label>
          <div class="form-select-wrap">
            <select class="form-select" id="f-category"></select>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-notes">Notes</label>
          <textarea class="form-textarea" id="f-notes" placeholder="Informació addicional…"></textarea>
        </div>
      </form>
      <div class="form-actions">
        <button class="btn-primary" id="btn-save-item">Desar article</button>
        <button class="btn-danger" id="btn-delete-item" hidden>Eliminar article</button>
      </div>
    </div>
  </div>

  <!-- ── MODAL: CATEGORIA ── -->
  <div class="modal-overlay" id="modal-cat" role="dialog" aria-modal="true" aria-labelledby="modal-cat-title">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-cat-title">Nova categoria</h2>
        <button class="modal-close" id="btn-cat-modal-close" aria-label="Tancar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form class="modal-form" id="cat-form" autocomplete="off" novalidate>
        <div class="form-field">
          <label class="form-label" for="f-cat-name">Nom de la categoria *</label>
          <input class="form-input" id="f-cat-name" type="text" placeholder="p.ex. Alimentació">
        </div>
        <div class="form-field">
          <label class="form-label">Color</label>
          <div class="color-picker" id="color-picker"></div>
        </div>
      </form>
      <div class="form-actions">
        <button class="btn-primary" id="btn-save-cat">Desar categoria</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="js/app.js"></script>
</body>
</html>
